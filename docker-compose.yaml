services:
  db:
    image: timescale/timescaledb:2.17.2-pg15
    container_name: pitwall-db
    environment:
      POSTGRES_USER: pitwall
      POSTGRES_PASSWORD: pitwall
      POSTGRES_DB: pitwall
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitwall -d pitwall"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://pitwall:pitwall@db:5432/pitwall
    command: python -m alembic -c alembic.ini upgrade head
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://pitwall:pitwall@db:5432/pitwall
      LOG_LEVEL: INFO
      PACE_PREDICTOR: scipy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  pgdata: