services:
  db:
    image: timescale/timescaledb:2.17.2-pg15
    container_name: pitwall-db
    environment:
      POSTGRES_USER: pitwall
      POSTGRES_PASSWORD: pitwall
      POSTGRES_DB: pitwall
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitwall -d pitwall"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://pitwall:pitwall@db:5432/pitwall
    command: python -m alembic -c alembic.ini upgrade head
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: prod
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://pitwall:pitwall@db:5432/pitwall
      LOG_LEVEL: INFO
      PACE_PREDICTOR: scipy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: dev
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws/v1/live
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5173').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  pgdata:
