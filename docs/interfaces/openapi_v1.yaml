# ============================================================================
# PitWall — OpenAPI v1
# ============================================================================
# Owner:    Stream B (proposed at kickoff, Day 1).
# Consumed: Stream C (frontend types via openapi-typescript).
# Status:   v1 finalised at Day 1 kickoff. The runtime source of truth is
#           the spec auto-generated by FastAPI at `GET /openapi.json` once
#           the backend is up. CI exports that, converts it to YAML, and
#           diffs it against this file (Stream B Day 7).
#
# WebSockets are not first-class in OpenAPI 3.0; the `/ws/v1/live` channel
# is documented separately in `websocket_messages.md` (referenced below).
# ============================================================================

openapi: 3.0.3

info:
  title: PitWall API
  version: 0.1.0
  description: |
    Real-time F1 undercut detection engine.

    The HTTP surface exposes the data and control plane:
    - **Catalogue**: list available sessions, fetch fitted degradation curves.
    - **Replay control**: start and stop a deterministic replay of a
      historical session through the in-memory engine.
    - **Snapshots**: read the engine's race state.
    - **Configuration**: switch the active pace predictor at runtime.
    - **Back-test**: compare alerts emitted by the engine against the
      curated list of known historical undercuts.

    The push surface (`/ws/v1/live`) is a WebSocket channel; see
    `docs/interfaces/websocket_messages.md` for the message envelope and
    the supported `type` values.

    See also `docs/architecture.md`, ADR 0008 (OpenAPI as source of truth),
    and quanta 04 (window-of-undercut formula).

  contact:
    name: PitWall Team
  license:
    name: MIT

servers:
  - url: http://localhost:8000
    description: Local dev (host-side)
  - url: http://backend:8000
    description: Inside the docker-compose network

tags:
  - name: health
    description: Liveness / readiness probes.
  - name: sessions
    description: Catalogue and live snapshots of historical race sessions.
  - name: replay
    description: Start and stop deterministic replays.
  - name: degradation
    description: Fitted tyre-degradation curves used by the baseline predictor.
  - name: backtest
    description: Compare engine alerts against curated known undercuts.
  - name: config
    description: Runtime configuration toggles (predictor selection, etc.).
  - name: causal
    description: Read-only causal undercut viability predictions.

paths:

  /health:
    get:
      tags: [health]
      operationId: getHealth
      summary: Liveness probe
      description: Always returns 200 when the process is alive.
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }

  /ready:
    get:
      tags: [health]
      operationId: getReady
      summary: Readiness probe
      description: |
        Returns 200 when the backend is ready to serve real traffic — DB
        connection up, the configured predictor model is loaded, and the
        most recent migration is applied. 503 otherwise.
      responses:
        "200":
          description: Backend is ready.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }
        "503":
          description: Backend not ready.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }

  /api/v1/sessions:
    get:
      tags: [sessions]
      operationId: listSessions
      summary: List sessions present in the database
      responses:
        "200":
          description: OK. The list may be empty.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SessionSummary" }
              examples:
                two_demo_races:
                  summary: Three demo races loaded
                  value:
                    - session_id: bahrain_2024_R
                      circuit_id: bahrain
                      season: 2024
                      round_number: 1
                      date: "2024-03-02"
                      total_laps: 57
                    - session_id: monaco_2024_R
                      circuit_id: monaco
                      season: 2024
                      round_number: 8
                      date: "2024-05-26"
                      total_laps: 78
                    - session_id: hungary_2024_R
                      circuit_id: hungary
                      season: 2024
                      round_number: 13
                      date: "2024-07-21"
                      total_laps: 70

  /api/v1/sessions/{session_id}/snapshot:
    get:
      tags: [sessions]
      operationId: getSessionSnapshot
      summary: Current engine state for an active replay
      description: |
        Returns the in-memory `RaceState` for the session that is
        currently being replayed. 404 if there is no active replay for
        the requested `session_id`.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RaceSnapshot" }
        "404":
          description: No active replay for this session.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }

  /api/v1/replay/start:
    post:
      tags: [replay]
      operationId: startReplay
      summary: Start a replay of a historical session
      description: |
        Boots the `ReplayFeed` against the requested session and begins
        emitting events to the engine. Only one replay may run at a
        time in V1; calling this while a replay is active returns 409.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReplayStartRequest" }
            examples:
              monaco_30x:
                summary: Monaco 2024 at 30× speed
                value: { session_id: monaco_2024_R, speed_factor: 30 }
      responses:
        "202":
          description: Replay started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReplayRun" }
        "400":
          description: Malformed request body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404":
          description: Session not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }
        "409":
          description: A replay is already running.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }

  /api/v1/replay/stop:
    post:
      tags: [replay]
      operationId: stopReplay
      summary: Stop the active replay
      description: |
        Idempotent. Returns 200 even if no replay was running.
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReplayStopResponse" }

  /api/v1/degradation:
    get:
      tags: [degradation]
      operationId: getDegradationCurve
      summary: Fitted degradation curve for a circuit + compound
      parameters:
        - in: query
          name: circuit
          required: true
          schema: { type: string }
          example: monaco
        - in: query
          name: compound
          required: true
          schema: { $ref: "#/components/schemas/Compound" }
          example: MEDIUM
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DegradationCurve" }
        "404":
          description: No fit available for this (circuit, compound).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }

  /api/v1/causal/prediction:
    get:
      tags: [causal]
      operationId: getCausalPrediction
      summary: Causal undercut viability prediction for one driver pair at one lap
      description: |
        Read-only endpoint that reconstructs a single attacker/defender state
        from query parameters and evaluates the causal live-inference chain.
        It does not require an active replay and does not modify engine state.
      parameters:
        - in: query
          name: session_id
          required: false
          description: Session identifier, e.g. `bahrain_2024_R`.
          schema:
            type: string
            default: bahrain_2024_R
          example: bahrain_2024_R
        - in: query
          name: circuit_id
          required: false
          description: Circuit slug, e.g. `bahrain`.
          schema:
            type: string
            default: bahrain
          example: bahrain
        - in: query
          name: lap_number
          required: false
          description: Current race lap number.
          schema:
            type: integer
            minimum: 1
            default: 30
        - in: query
          name: total_laps
          required: false
          description: Total scheduled race laps.
          schema:
            type: integer
            minimum: 1
            nullable: true
          example: 57
        - in: query
          name: attacker
          required: false
          description: Attacker driver code, e.g. `NOR`.
          schema:
            type: string
            default: NOR
          example: NOR
        - in: query
          name: attacker_compound
          required: false
          description: Attacker tyre compound.
          schema:
            $ref: "#/components/schemas/Compound"
            default: MEDIUM
        - in: query
          name: attacker_tyre_age
          required: false
          description: Attacker tyre age in laps.
          schema:
            type: integer
            minimum: 0
            default: 15
        - in: query
          name: defender
          required: false
          description: Defender driver code, e.g. `VER`.
          schema:
            type: string
            default: VER
          example: VER
        - in: query
          name: defender_compound
          required: false
          description: Defender tyre compound.
          schema:
            $ref: "#/components/schemas/Compound"
            default: HARD
        - in: query
          name: defender_tyre_age
          required: false
          description: Defender tyre age in laps.
          schema:
            type: integer
            minimum: 0
            default: 25
        - in: query
          name: gap_ms
          required: false
          description: Current gap attacker to defender in milliseconds.
          schema:
            type: integer
            minimum: 0
            default: 5000
        - in: query
          name: pit_loss_ms
          required: false
          description: Estimated pit-stop time loss in milliseconds.
          schema:
            type: integer
            minimum: 0
            default: 21000
        - in: query
          name: track_status
          required: false
          description: Current track status.
          schema:
            $ref: "#/components/schemas/TrackStatus"
            default: GREEN
        - in: query
          name: rainfall
          required: false
          description: True if rainfall is reported at the circuit.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Prediction produced successfully.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CausalPredictionOut" }
        "422":
          description: Validation Error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPValidationError" }

  /api/v1/backtest/{session_id}:
    get:
      tags: [backtest]
      operationId: getBacktestResult
      summary: Engine alerts vs replay-derived undercuts for a session
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - in: query
          name: predictor
          required: false
          schema:
            $ref: "#/components/schemas/PredictorName"
          description: |
            Predictor to evaluate. Defaults to the active server-side
            predictor.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BacktestResult" }
        "404":
          description: Session not found, or replay events are unavailable.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }

  /api/v1/config/predictor:
    post:
      tags: [config]
      operationId: setActivePredictor
      summary: Switch the active pace predictor at runtime
      description: |
        Switches `PacePredictor` between `scipy` and `xgboost` without
        restarting the backend. The new predictor takes effect on the
        next `lap_complete` processed by the engine. 409 if the
        requested predictor's model is not loaded (e.g. `xgboost`
        before `make train-xgb` has run).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetPredictorRequest" }
            examples:
              switch_to_xgb:
                value: { predictor: xgboost }
      responses:
        "200":
          description: OK. Returns the now-active predictor.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetPredictorResponse" }
        "400":
          description: Unknown predictor name.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }
        "409":
          description: Requested predictor is not loaded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }

components:

  parameters:
    SessionId:
      in: path
      name: session_id
      required: true
      schema: { type: string }
      example: monaco_2024_R

  schemas:

    Compound:
      type: string
      enum: [SOFT, MEDIUM, HARD, INTER, WET]
      description: |
        Tyre compound identifier. Values match
        `pitwall.engine.projection.Compound` and the CHECK constraints
        in `db_schema_v1.sql`.

    PredictorName:
      type: string
      enum: [scipy, xgboost]

    TrackStatus:
      type: string
      enum: [GREEN, SC, VSC, YELLOW, RED]

    AlertType:
      type: string
      enum:
        - UNDERCUT_VIABLE
        - UNDERCUT_RISK
        - UNDERCUT_DISABLED_RAIN
        - SUSPENDED_SC
        - SUSPENDED_VSC
        - INSUFFICIENT_DATA
      description: |
        See `websocket_messages.md` for the meaning of each value and
        the conditions under which the engine emits it.

    Health:
      type: object
      required: [status, version]
      properties:
        status: { type: string, example: ok }
        version: { type: string, example: "0.1.0" }

    Problem:
      type: object
      required: [detail]
      description: |
        FastAPI's default error envelope. Kept minimal in V1; can be
        upgraded to RFC 7807 (`type`, `title`, `status`) without
        breaking clients because `detail` is preserved.
      properties:
        detail:
          oneOf:
            - { type: string }
            - { type: array, items: { type: object } }
          example: Session 'monaco_2024_R' not found.

    ValidationError:
      type: object
      required: [loc, msg, type]
      properties:
        loc:
          type: array
          items:
            oneOf:
              - { type: string }
              - { type: integer }
        msg:   { type: string }
        type:  { type: string }
        input: {}
        ctx:
          type: object
          additionalProperties: true

    HTTPValidationError:
      type: object
      properties:
        detail:
          type: array
          items: { $ref: "#/components/schemas/ValidationError" }

    SessionSummary:
      type: object
      required: [session_id, circuit_id, season, round_number, date]
      properties:
        session_id:   { type: string, example: monaco_2024_R }
        circuit_id:   { type: string, example: monaco }
        season:       { type: integer, example: 2024 }
        round_number: { type: integer, example: 8 }
        date:         { type: string, format: date }
        total_laps:   { type: integer, nullable: true, example: 78 }

    DriverState:
      type: object
      required:
        - driver_code
        - position
        - compound
        - tyre_age
        - is_in_pit
        - is_lapped
        - stint_number
      properties:
        driver_code:        { type: string, example: VER }
        team_code:          { type: string, nullable: true, example: RBR }
        position:           { type: integer, example: 1 }
        gap_to_leader_ms:   { type: integer, nullable: true, example: 0 }
        gap_to_ahead_ms:    { type: integer, nullable: true, example: null }
        last_lap_ms:        { type: integer, nullable: true, example: 74521 }
        compound:           { $ref: "#/components/schemas/Compound" }
        tyre_age:           { type: integer, example: 18 }
        is_in_pit:          { type: boolean }
        is_lapped:          { type: boolean }
        last_pit_lap:       { type: integer, nullable: true }
        stint_number:       { type: integer, example: 1 }
        undercut_score:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 1
          description: |
            Score `[0, 1]` of the undercut opportunity towards the
            driver immediately ahead. `null` if no relevant pair (e.g.
            this driver leads the race or is lapped).

    RaceSnapshot:
      type: object
      required:
        - session_id
        - current_lap
        - track_status
        - drivers
        - active_predictor
        - last_event_ts
      properties:
        session_id:    { type: string }
        current_lap:   { type: integer }
        track_status:  { $ref: "#/components/schemas/TrackStatus" }
        track_temp_c:  { type: number, format: float, nullable: true }
        air_temp_c:    { type: number, format: float, nullable: true }
        humidity_pct:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 100
        drivers:
          type: array
          items: { $ref: "#/components/schemas/DriverState" }
        active_predictor: { $ref: "#/components/schemas/PredictorName" }
        last_event_ts:    { type: string, format: date-time }

    DegradationCurve:
      type: object
      required: [circuit_id, compound, coefficients, n_samples]
      properties:
        circuit_id: { type: string }
        compound:   { $ref: "#/components/schemas/Compound" }
        coefficients:
          type: object
          required: [a, b, c]
          description: |
            Quadratic coefficients of the model
            `lap_time_ms(t) = a + b·t + c·t²` where `t = tyre_age`.
          properties:
            a: { type: number, format: double, example: 74500 }
            b: { type: number, format: double, example: 120 }
            c: { type: number, format: double, example: 5 }
        r_squared:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 1
        n_samples: { type: integer, example: 412 }
        sample_points:
          type: array
          description: Optional raw points for plotting.
          items:
            type: object
            required: [tyre_age, lap_time_ms]
            properties:
              tyre_age:    { type: integer }
              lap_time_ms: { type: integer }

    CausalCounterfactualOut:
      type: object
      required:
        - scenario_name
        - undercut_viable
        - main_limiting_factor
        - explanation
      properties:
        scenario_name: { type: string }
        undercut_viable: { type: boolean }
        required_gain_ms: { type: integer, nullable: true }
        projected_gain_ms: { type: integer, nullable: true }
        projected_gap_after_pit_ms: { type: integer, nullable: true }
        main_limiting_factor: { type: string }
        explanation: { type: string }

    CausalPredictionOut:
      type: object
      required:
        - session_id
        - circuit_id
        - lap_number
        - attacker_code
        - defender_code
        - undercut_viable
        - support_level
        - confidence
        - traffic_after_pit
        - top_factors
        - explanations
        - counterfactuals
      properties:
        session_id: { type: string }
        circuit_id: { type: string }
        lap_number: { type: integer }
        attacker_code: { type: string }
        defender_code: { type: string }
        undercut_viable: { type: boolean }
        support_level:
          type: string
          description: One of `strong`, `weak`, or `insufficient`.
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
        required_gain_ms: { type: integer, nullable: true }
        projected_gain_ms: { type: integer, nullable: true }
        projected_gap_after_pit_ms: { type: integer, nullable: true }
        traffic_after_pit: { type: string }
        top_factors:
          type: array
          items: { type: string }
        explanations:
          type: array
          items: { type: string }
        counterfactuals:
          type: array
          items: { $ref: "#/components/schemas/CausalCounterfactualOut" }

    ReplayStartRequest:
      type: object
      required: [session_id]
      properties:
        session_id:   { type: string, example: monaco_2024_R }
        speed_factor:
          type: number
          format: float
          default: 30
          minimum: 1
          maximum: 1000
          description: |
            Wall-clock acceleration. `1` = real time, `1000` = test
            mode. Implementation must process events in causal order;
            see ``replay_event_format.md`` § ordering.

    ReplayRun:
      type: object
      required: [run_id, session_id, speed_factor, started_at, pace_predictor]
      properties:
        run_id:         { type: string, format: uuid }
        session_id:     { type: string }
        speed_factor:   { type: number, format: float }
        started_at:     { type: string, format: date-time }
        pace_predictor: { $ref: "#/components/schemas/PredictorName" }

    ReplayStopResponse:
      type: object
      required: [stopped]
      properties:
        stopped:
          type: boolean
          description: |
            `true` if a replay was running and has been stopped, `false`
            if there was nothing to stop. Either way, the response
            status is 200.
        run_id: { type: string, format: uuid, nullable: true }

    SetPredictorRequest:
      type: object
      required: [predictor]
      properties:
        predictor: { $ref: "#/components/schemas/PredictorName" }

    SetPredictorResponse:
      type: object
      required: [active_predictor]
      properties:
        active_predictor: { $ref: "#/components/schemas/PredictorName" }

    UndercutMatch:
      type: object
      required: [attacker, defender]
      properties:
        attacker:       { type: string, example: NOR }
        defender:       { type: string, example: VER }
        lap_alerted:    { type: integer, nullable: true }
        lap_actual:     { type: integer, nullable: true }
        was_successful: { type: boolean, nullable: true }

    BacktestResult:
      type: object
      required:
        - session_id
        - predictor
        - precision
        - recall
        - f1
      properties:
        session_id:           { type: string }
        predictor:            { $ref: "#/components/schemas/PredictorName" }
        precision:            { type: number, format: float, minimum: 0, maximum: 1 }
        recall:               { type: number, format: float, minimum: 0, maximum: 1 }
        f1:                   { type: number, format: float, minimum: 0, maximum: 1 }
        mean_lead_time_laps:  { type: number, format: float, nullable: true }
        mae_k1_ms:            { type: integer, nullable: true }
        mae_k3_ms:            { type: integer, nullable: true }
        mae_k5_ms:            { type: integer, nullable: true }
        true_positives:
          type: array
          items: { $ref: "#/components/schemas/UndercutMatch" }
        false_positives:
          type: array
          items: { $ref: "#/components/schemas/UndercutMatch" }
        false_negatives:
          type: array
          items: { $ref: "#/components/schemas/UndercutMatch" }
