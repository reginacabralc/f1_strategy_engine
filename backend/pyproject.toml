[project]
name = "pitwall"
version = "0.1.0"
description = "Real-time F1 undercut detection engine"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "PitWall Team" }]

# Stream A, Day 1: minimal dependencies — the PacePredictor interface uses
# only the standard library. Stream D will expand this file on its own
# Day 1 with the full backend stack (FastAPI, uvicorn, structlog, SQLModel,
# Alembic, psycopg, Polars, scipy, xgboost, FastF1, etc.). Keep additions
# additive; do not reorganise this skeleton without coordinating with D.
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "hypothesis>=6.99",
    "ruff>=0.5",
    "mypy>=1.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pitwall"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.ruff.lint.isort]
known-first-party = ["pitwall"]

[tool.mypy]
python_version = "3.12"
strict = true
files = ["src", "tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
pythonpath = ["src"]
asyncio_mode = "auto"
