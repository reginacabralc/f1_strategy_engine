name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff-mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -e 'backend[dev]'

      - name: ruff
        run: cd backend && python -m ruff check .

      - name: mypy
        run: cd backend && python -m mypy src tests
