name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:2.17.2-pg15
        env:
          POSTGRES_USER: pitwall
          POSTGRES_PASSWORD: pitwall
          POSTGRES_DB: pitwall
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pitwall -d pitwall"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql+psycopg://pitwall:pitwall@localhost:5432/pitwall

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -e 'backend[dev]'

      - name: Run migrations
        run: cd backend && python -m alembic -c alembic.ini upgrade head

      - name: pytest unit
        run: cd backend && python -m pytest tests/unit -q
