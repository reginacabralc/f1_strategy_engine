name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff-mypy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: ruff check
        run: .venv/bin/python -m ruff check .

      - name: mypy
        run: .venv/bin/python -m mypy src tests

  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: timescale/timescaledb:2.17.2-pg15
        env:
          POSTGRES_USER: pitwall
          POSTGRES_PASSWORD: pitwall
          POSTGRES_DB: pitwall
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pitwall -d pitwall"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql+psycopg://pitwall:pitwall@localhost:5432/pitwall

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run migrations
        run: .venv/bin/python -m alembic -c alembic.ini upgrade head

      - name: pytest
        run: .venv/bin/python -m pytest tests/ -q
